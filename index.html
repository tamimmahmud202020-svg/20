<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>সাহিত্য পরীক্ষা — গদ্য ও কবিতা কুইজ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Noto+Serif+Bengali:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F6EFE2;
    --paper-deep:#EFE4D0;
    --ink:#2C2419;
    --ink-soft:#5C5042;
    --maroon:#7C2230;
    --maroon-deep:#5A1722;
    --teal:#1E4943;
    --gold:#B8902F;
    --line:#D8C9AC;
    --good:#2E6B4F;
    --bad:#A33A2E;
    --radius:14px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(900px 500px at 10% -10%, rgba(124,34,48,0.06), transparent 60%),
      radial-gradient(900px 600px at 110% 10%, rgba(30,73,67,0.07), transparent 60%),
      var(--paper);
    color:var(--ink);
    font-family:'Hind Siliguri', sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:18px 16px 60px;
  }
  .app{width:100%; max-width:640px;}

  /* timer */
  .timer-bar{
    display:flex; justify-content:flex-end; align-items:center;
    margin-bottom:14px;
  }
  .timer-pill{
    font-family:'Hind Siliguri', sans-serif; font-weight:700; font-size:14px;
    background:#FFFDF8; border:1.5px solid var(--line); color:var(--maroon);
    padding:7px 14px; border-radius:99px; letter-spacing:0.5px;
    display:flex; align-items:center; gap:6px;
  }
  .timer-pill.warn{border-color:var(--bad); color:var(--bad);}

  /* progress */
  .progress-wrap{margin-bottom:18px;}
  .progress-meta{
    display:flex; justify-content:space-between; align-items:baseline;
    font-size:12px; color:var(--ink-soft); margin-bottom:6px;
  }
  .progress-meta b{color:var(--maroon); font-family:'Noto Serif Bengali',serif; font-size:13px;}
  .progress-track{height:5px; background:var(--paper-deep); border-radius:4px; overflow:hidden; border:1px solid var(--line);}
  .progress-fill{height:100%; background:linear-gradient(90deg, var(--maroon), var(--gold)); width:0%; transition:width .35s ease;}

  /* card = book page */
  .card{
    position:relative;
    background:#FFFDF8;
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:26px 22px 22px 30px;
    box-shadow:0 1px 0 rgba(0,0,0,0.02), 0 18px 40px -24px rgba(44,36,25,0.35);
  }
  .card::before{
    content:"";
    position:absolute; left:0; top:10px; bottom:10px; width:6px;
    background:repeating-linear-gradient(180deg, var(--maroon), var(--maroon) 8px, var(--maroon-deep) 8px, var(--maroon-deep) 9px);
    border-radius:4px 0 0 4px;
  }
  .tag{
    display:inline-block; font-size:11px; font-weight:700; letter-spacing:1px;
    color:var(--teal); background:rgba(30,73,67,0.08);
    border:1px solid rgba(30,73,67,0.18);
    padding:3px 10px; border-radius:99px; margin-bottom:14px;
  }
  .q-text{
    font-family:'Noto Serif Bengali', serif;
    font-weight:600; font-size:18px; line-height:1.65;
    margin:0 0 18px; color:var(--ink);
  }
  .options{display:flex; flex-direction:column; gap:10px;}
  .opt{
    display:flex; align-items:flex-start; gap:10px;
    text-align:left; width:100%;
    background:var(--paper); border:1.5px solid var(--line);
    border-radius:10px; padding:12px 14px;
    font-family:'Hind Siliguri', sans-serif; font-size:15px; color:var(--ink);
    cursor:pointer; transition:border-color .15s, background .15s, transform .1s;
  }
  .opt:active{transform:scale(0.99);}
  .opt .bullet{
    flex:0 0 auto; width:22px; height:22px; border-radius:50%;
    border:1.5px solid var(--ink-soft); color:var(--ink-soft);
    font-size:12px; font-weight:700; display:flex; align-items:center; justify-content:center;
    font-family:'Hind Siliguri',sans-serif;
  }
  .opt:hover{border-color:var(--maroon);}
  .opt.selected{border-color:var(--maroon); background:rgba(124,34,48,0.06);}
  .opt.selected .bullet{background:var(--maroon); border-color:var(--maroon); color:#fff;}
  .opt.correct{border-color:var(--good); background:rgba(46,107,79,0.08);}
  .opt.correct .bullet{background:var(--good); border-color:var(--good); color:#fff;}
  .opt.incorrect{border-color:var(--bad); background:rgba(163,58,46,0.08);}
  .opt.incorrect .bullet{background:var(--bad); border-color:var(--bad); color:#fff;}
  .opt[disabled]{cursor:default;}

  .nav-row{
    display:flex; justify-content:space-between; align-items:center;
    margin-top:20px; gap:10px;
  }
  .btn{
    font-family:'Hind Siliguri', sans-serif; font-weight:600; font-size:14px;
    padding:11px 18px; border-radius:9px; border:none; cursor:pointer;
    transition:opacity .15s, transform .1s;
  }
  .btn:active{transform:scale(0.97);}
  .btn-primary{background:var(--maroon); color:#fff;}
  .btn-primary:disabled{opacity:0.35; cursor:not-allowed;}
  .btn-ghost{background:transparent; color:var(--ink-soft); border:1.5px solid var(--line);}
  .btn-skip{background:transparent; color:var(--maroon); border:1.5px dashed var(--maroon); font-size:13px; padding:9px 14px;}
  .nav-row{flex-wrap:wrap;}

  /* results */
  .result-card{text-align:center; padding-top:34px; padding-bottom:30px;}
  .result-score{
    font-family:'Noto Serif Bengali', serif; font-weight:800;
    font-size:52px; color:var(--maroon); line-height:1;
  }
  .result-out-of{font-size:16px; color:var(--ink-soft); margin-top:4px;}
  .result-line{
    width:50px; height:2px; background:var(--gold); margin:18px auto;
  }
  .result-msg{
    font-family:'Noto Serif Bengali', serif; font-size:17px; font-weight:600;
    margin-bottom:22px; color:var(--ink);
  }
  .breakdown{
    text-align:left; display:flex; flex-direction:column; gap:8px;
    margin:0 0 24px; padding:16px; background:var(--paper); border-radius:10px;
    border:1px solid var(--line);
  }
  .breakdown-row{display:flex; justify-content:space-between; font-size:13.5px;}
  .breakdown-row span:first-child{color:var(--ink-soft);}
  .breakdown-row span:last-child{font-weight:700; color:var(--teal);}
  .result-actions{display:flex; flex-direction:column; gap:10px;}
  .share-feedback{font-size:12px; color:var(--good); height:16px; margin-top:2px;}

  .footer-note{
    text-align:center; font-size:11px; color:var(--ink-soft);
    margin-top:18px; letter-spacing:0.4px;
  }

  /* wish message + floating flowers */
  .wish-msg{
    font-family:'Noto Serif Bengali', serif; font-weight:600; font-size:16px;
    color:var(--maroon); margin:0 0 22px; line-height:1.6;
  }
  .flower-layer{
    position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:50;
  }
  .flower-bit{
    position:absolute; bottom:-40px; font-size:22px; opacity:0.9;
    animation-name:floatUp; animation-timing-function:ease-in; animation-fill-mode:forwards;
    will-change:transform, opacity;
  }
  @keyframes floatUp{
    0%{ transform:translateY(0) translateX(0) rotate(0deg); opacity:0.95; }
    100%{ transform:translateY(-115vh) translateX(var(--drift,20px)) rotate(360deg); opacity:0; }
  }

  @media (prefers-reduced-motion: reduce){
    .progress-fill, .opt, .btn{transition:none;}
  }
</style>
</head>
<body>
<div class="app">

  <div class="timer-bar">
    <div class="timer-pill" id="timerPill">⏱ ১০:০০</div>
  </div>

  <div id="quizScreen">
    <div class="progress-wrap">
      <div class="progress-meta">
        <span>প্রশ্ন <b id="qNum">১</b> / ৩০</span>
        <span id="sectionLabel">গদ্য অংশ</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    </div>

    <div class="card">
      <div class="tag" id="catTag">গদ্য অংশ</div>
      <p class="q-text" id="qText"></p>
      <div class="options" id="optionsWrap"></div>
    </div>

    <div class="nav-row">
      <button class="btn btn-ghost" id="prevBtn">← আগের প্রশ্ন</button>
      <button class="btn btn-skip" id="skipBtn">এড়িয়ে যান</button>
      <button class="btn btn-primary" id="nextBtn" disabled>পরবর্তী →</button>
    </div>
  </div>

  <div id="resultScreen" style="display:none;">
    <div class="card result-card">
      <div class="result-score" id="finalScore">০</div>
      <div class="result-out-of">/ ৩০ সঠিক</div>
      <div class="result-line"></div>
      <div class="result-msg" id="resultMsg"></div>

      <div class="breakdown" id="breakdownWrap"></div>

      <p class="wish-msg">তোমার আগামীকালের পরীক্ষার জন্য শুভকামনা🌸</p>

      <div class="result-actions">
        <button class="btn btn-primary" id="shareBtn">ফলাফল শেয়ার করুন 📤</button>
        <button class="btn btn-ghost" id="retakeBtn">আবার দিন</button>
      </div>
      <div class="share-feedback" id="shareFeedback"></div>
    </div>
  </div>

  <div class="flower-layer" id="flowerLayer"></div>

</div>

<script>
const QUESTIONS = [
{cat:"গদ্য", q:"ঈশ্বরচন্দ্র বিদ্যাসাগরের 'প্রত্যুপকার' গল্পে আলী আব্বাস কাকে আশ্রয় দিয়েছিলেন?", opts:["খলিফা মামুনকে","দামেস্কের এক পদচ্যুত শাসনকর্তাকে","বোগদাদের এক সওদাগরকে","একজন অপরিচিত সাধারণ বন্দিকে"], correct:1},
{cat:"গদ্য", q:"'প্রত্যুপকার' গল্পে বন্দি ব্যক্তির চরিত্রে কোন মহান গুণটি সবচেয়ে উজ্জ্বল হয়ে উঠেছে?", opts:["সাহসিকতা ও বীরত্ব","চরম বিপদেও সত্যবাদিতা ও সুগভীর কৃতজ্ঞতাবোধ","খলিফাকে ক্ষমা করার মানসিকতা","ধনসম্পদের প্রতি উদাসীনতা"], correct:1},
{cat:"গদ্য", q:"'ফুলের বিবাহ' প্রবন্ধে বঙ্কিমচন্দ্র চট্টোপাধ্যায় মূলত কী প্রকাশ করেছেন?", opts:["উদ্ভিদের বৈজ্ঞানিক প্রজনন প্রক্রিয়া","রূপকের সাহায্যে মানবসমাজের আচার-অনুষ্ঠান ও বিবাহরীতির ব্যঙ্গাত্মক রূপ","উদ্যান পালনের নিয়মাবলী","গ্রামীণ প্রকৃতির রূপের বর্ণনা"], correct:1},
{cat:"গদ্য", q:"'ফুলের বিবাহ' রচনায় বিবাহের গোধূলিলগ্নে নহবৎ বা সানাই বাজানোর দায়িত্ব কে পালন করেছিল?", opts:["ভ্রমর","মৌমাছি","কোকিল","উচ্চিঙ্গড়া (ঝিঁঝিঁ পোকা)"], correct:3},
{cat:"গদ্য", q:"'সুশিক্ষিত লোক মাত্রই স্বশিক্ষিত'— 'বই পড়া' প্রবন্ধে প্রমথ চৌধুরী এই উক্তিটি দিয়ে কী বোঝাতে চেয়েছেন?", opts:["পাঠ্যবই বা নোটবই মুখস্থ করা","জোর করে চাপিয়ে দেওয়া প্রাতিষ্ঠানিক শিক্ষা","সজ্ঞানে ও নিজের চেষ্টায় অর্জিত প্রকৃত জ্ঞান","উচ্চ ডিগ্রি লাভ করা"], correct:2},
{cat:"গদ্য", q:"প্রমথ চৌধুরীর মতে, মানুষের মনকে সচল, সজাগ ও সমৃদ্ধ রাখার প্রধান উপায় কোনটি?", opts:["বিজ্ঞান ও প্রযুক্তির চর্চা","সজ্ঞানে ও স্বেচ্ছায় সাহিত্যচর্চা করা","লাইব্রেরি থেকে দূরে থাকা","রাজনৈতিক সচেতনতা বৃদ্ধি"], correct:1},
{cat:"গদ্য", q:"সুভার বাবা বাণীকণ্ঠ সুভাকে অন্য বোনদের চেয়ে একটু বেশি ভালোবাসতেন কেন?", opts:["সে দেখতে অন্য বোনদের চেয়ে অনেক সুন্দর ছিল","সে ঘরের সব কাজ একাই সামলাত","সে ছিল বাক্‌প্রতিবন্ধী ও অসহায়","সে পড়াশোনায় খুব ভালো ছিল"], correct:2},
{cat:"গদ্য", q:"সুভা কোন নদীর তীরে বসে নিজের একাকীত্ব ভুলে প্রকৃতির মূক বা নির্বাক উপাদানের সাথে মিশে যেত?", opts:["কালিন্দী","ধলেশ্বরী","করতোয়া","কিশলয়"], correct:0},
{cat:"গদ্য", q:"শরৎচন্দ্র চট্টোপাধ্যায় 'অভাগীর স্বর্গ' গল্পে মূলত কোন সামাজিক বাস্তবতার নিষ্ঠুর রূপ ফুটিয়ে তুলেছেন?", opts:["শহরের যান্ত্রিক জীবন ও পারিবারিক কলহ","গ্রামীণ অর্থনৈতিক বৈষম্য, চরম দারিদ্র্য ও জাতিভেদ প্রথা","বাল্যবিবাহ ও বহুবিবাহ প্রথা","জমিদারি আমলের রাজনৈতিক যুদ্ধ"], correct:1},
{cat:"গদ্য", q:"কাঙালীর মা (অভাগী) মৃত্যুর সময় কার পায়ের ধুলো মাথায় নেওয়ার জন্য আকুল ব্যাকুল হয়েছিল?", opts:["গ্রামের জমিদার বাবুর","তার অত্যাচারী স্বামী রসিক দুলের","সমবেত প্রতিবেশীদের","উঁচু জাতের 'বামুন-মা'-র"], correct:3},
{cat:"গদ্য", q:"'নিরীহ বাঙালি' প্রবন্ধে লেখিকা রোকেয়া সাখাওয়াত হোসেন বাঙালির আলস্যকে কী হিসেবে আখ্যায়িত করেছেন?", opts:["দ্বিগুণাত্মক","ত্রিগুণাত্মক","চারিত্রিক বৈশিষ্ট্যহীন","প্রাকৃতিক দুর্যোগ"], correct:1},
{cat:"গদ্য", q:"'পল্লীসাহিত্য' প্রবন্ধে ড. মুহম্মদ শহীদুল্লাহ্‌ পল্লীর প্রাচীন ছড়া, উপকথা ও বচনগুলো সংরক্ষণের জন্য কোন প্রতিষ্ঠান গড়ার তীব্র প্রয়োজনীয়তা ব্যক্ত করেছেন?", opts:["ফোকলোর সোসাইটি (Folklore Society)","প্রত্নতাত্ত্বিক গবেষণা কেন্দ্র","পল্লী উন্নয়ন একাডেমি","বাংলা একাডেমি"], correct:0},

{cat:"কবিতা", q:"'বন্ধনা' (বন্দনা) কবিতায় কবি শাহ্‌ মুহম্মদ সগীর কাব্যের শুরুতে সর্বপ্রথম কাকে স্মরণ করেছেন?", opts:["নিজ জন্মদাত্রী মাতাকে","জগতের সৃষ্টিকর্তা আল্লাহ তাআলাকে","তৎকালীন মহান রাজাকে","তাঁর দীক্ষাগুরু বা শিক্ষককে"], correct:1},

const TOTAL = QUESTIONS.length;
let current = 0;
let answers = new Array(TOTAL).fill(null); // selected index per question
let skipped = new Array(TOTAL).fill(false);

const qNumEl = document.getElementById('qNum');
const sectionLabelEl = document.getElementById('sectionLabel');
const progressFill = document.getElementById('progressFill');
const catTag = document.getElementById('catTag');
const qText = document.getElementById('qText');
const optionsWrap = document.getElementById('optionsWrap');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const skipBtn = document.getElementById('skipBtn');
const quizScreen = document.getElementById('quizScreen');
const resultScreen = document.getElementById('resultScreen');
const timerPill = document.getElementById('timerPill');

const toBnDigits = (n) => String(n).replace(/\d/g, d => "০১২৩৪৫৬৭৮৯"[d]);
const letters = ["ক","খ","গ","ঘ"];

function renderQuestion(){
  const item = QUESTIONS[current];
  qNumEl.textContent = toBnDigits(current+1);
  sectionLabelEl.textContent = item.cat + " অংশ";
  catTag.textContent = item.cat + " অংশ";
  qText.textContent = (current+1) + ". " + item.q;
  progressFill.style.width = ((current+1)/TOTAL*100) + "%";

  optionsWrap.innerHTML = "";
  item.opts.forEach((opt, idx) => {
    const btn = document.createElement('button');
    btn.className = "opt";
    btn.innerHTML = `<span class="bullet">${letters[idx]}</span><span>${opt}</span>`;
    if(answers[current] !== null){
      btn.disabled = true;
      if(idx === item.correct){ btn.classList.add('correct'); }
      else if(idx === answers[current]){ btn.classList.add('incorrect'); }
    }
    if(answers[current] === idx) btn.classList.add('selected');
    btn.addEventListener('click', () => selectAnswer(idx));
    optionsWrap.appendChild(btn);
  });

  prevBtn.style.visibility = current === 0 ? "hidden" : "visible";
  nextBtn.disabled = answers[current] === null && !skipped[current];
  nextBtn.textContent = current === TOTAL - 1 ? "ফলাফল দেখুন →" : "পরবর্তী →";
  skipBtn.style.visibility = answers[current] !== null ? "hidden" : "visible";
}

function selectAnswer(idx){
  if(answers[current] !== null) return; // lock after first pick
  answers[current] = idx;
  skipped[current] = false;
  renderQuestion();
}

nextBtn.addEventListener('click', () => {
  if(answers[current] === null && !skipped[current]) return;
  if(current === TOTAL - 1){
    showResults();
  } else {
    current++;
    renderQuestion();
  }
});

skipBtn.addEventListener('click', () => {
  skipped[current] = true;
  if(current === TOTAL - 1){
    showResults();
  } else {
    current++;
    renderQuestion();
  }
});

prevBtn.addEventListener('click', () => {
  if(current > 0){
    current--;
    renderQuestion();
  }
});

function showResults(){
  clearInterval(timerInterval);
  let score = 0;
  let skippedCount = 0;
  const catStats = {};
  QUESTIONS.forEach((item, i) => {
    if(!catStats[item.cat]) catStats[item.cat] = {correct:0, total:0};
    catStats[item.cat].total++;
    if(answers[i] === item.correct){ score++; catStats[item.cat].correct++; }
    if(answers[i] === null) skippedCount++;
  });

  document.getElementById('finalScore').textContent = toBnDigits(score);

  let msg;
  const pct = score / TOTAL;
  if(pct >= 0.85) msg = "চমৎকার! সাহিত্যজ্ঞান অসাধারণ। 🏆";
  else if(pct >= 0.65) msg = "বেশ ভালো হয়েছে! আরেকটু ঝালিয়ে নিলেই পরিপূর্ণ। 👍";
  else if(pct >= 0.4) msg = "মন্দ নয়, তবে আরেকবার পড়ে নেওয়া দরকার। 📖";
  else msg = "চিন্তা নেই, আবার চেষ্টা করুন — পড়াই শেখার পথ। ✨";
  document.getElementById('resultMsg').textContent = msg;

  const breakdownWrap = document.getElementById('breakdownWrap');
  breakdownWrap.innerHTML = "";
  Object.entries(catStats).forEach(([cat, s]) => {
    const row = document.createElement('div');
    row.className = "breakdown-row";
    row.innerHTML = `<span>${cat}</span><span>${toBnDigits(s.correct)} / ${toBnDigits(s.total)}</span>`;
    breakdownWrap.appendChild(row);
  });
  if(skippedCount > 0){
    const row = document.createElement('div');
    row.className = "breakdown-row";
    row.innerHTML = `<span>এড়িয়ে যাওয়া প্রশ্ন</span><span>${toBnDigits(skippedCount)}</span>`;
    breakdownWrap.appendChild(row);
  }

  quizScreen.style.display = "none";
  resultScreen.style.display = "block";

  document.getElementById('shareBtn').onclick = () => shareResults(score, catStats);
  document.getElementById('retakeBtn').onclick = retake;

  startFlowers();
}

const flowerEmojis = ["🌸","🌷","🌼","💮","🌺"];
const flowerLayer = document.getElementById('flowerLayer');
let flowerInterval = null;

function spawnFlower(){
  const el = document.createElement('span');
  el.className = "flower-bit";
  el.textContent = flowerEmojis[Math.floor(Math.random()*flowerEmojis.length)];
  const leftPct = Math.random()*100;
  const duration = 6 + Math.random()*5;
  const drift = (Math.random()*120 - 60) + "px";
  const size = 16 + Math.random()*16;
  el.style.left = leftPct + "%";
  el.style.fontSize = size + "px";
  el.style.setProperty('--drift', drift);
  el.style.animationDuration = duration + "s";
  flowerLayer.appendChild(el);
  setTimeout(() => el.remove(), duration*1000 + 200);
}

function startFlowers(){
  stopFlowers();
  for(let i=0;i<6;i++){ setTimeout(spawnFlower, i*250); }
  flowerInterval = setInterval(spawnFlower, 700);
}

function stopFlowers(){
  clearInterval(flowerInterval);
  flowerLayer.innerHTML = "";
}

async function shareResults(score, catStats){
  const lines = [
    `📚 সাহিত্য পরীক্ষা — গদ্য ও কবিতা`,
    `স্কোর: ${toBnDigits(score)}/${toBnDigits(TOTAL)} (${Math.round(score/TOTAL*100)}%)`,
    ...Object.entries(catStats).map(([cat,s]) => `• ${cat}: ${toBnDigits(s.correct)}/${toBnDigits(s.total)}`),
    ``,
    `তুমিও দাও পরীক্ষা! 🎯`
  ];
  const text = lines.join("\n");

  const feedback = document.getElementById('shareFeedback');
  if(navigator.share){
    try{
      await navigator.share({ title: "সাহিত্য পরীক্ষা ফলাফল", text });
      return;
    }catch(e){ /* fall through to clipboard */ }
  }
  try{
    await navigator.clipboard.writeText(text);
    feedback.textContent = "ফলাফল কপি হয়েছে — পেস্ট করে শেয়ার করুন ✓";
    setTimeout(()=> feedback.textContent = "", 3000);
  }catch(e){
    feedback.textContent = text;
  }
}

function retake(){
  current = 0;
  answers = new Array(TOTAL).fill(null);
  skipped = new Array(TOTAL).fill(false);
  resultScreen.style.display = "none";
  quizScreen.style.display = "block";
  stopFlowers();
  renderQuestion();
  startTimer();
}

let timeLeft = 10 * 60;
let timerInterval = null;

function updateTimerDisplay(){
  const m = Math.floor(timeLeft / 60);
  const s = timeLeft % 60;
  const text = "⏱ " + toBnDigits(String(m).padStart(2,'0')) + ":" + toBnDigits(String(s).padStart(2,'0'));
  timerPill.textContent = text;
  timerPill.classList.toggle('warn', timeLeft <= 60);
}

function startTimer(){
  timeLeft = 10 * 60;
  updateTimerDisplay();
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimerDisplay();
    if(timeLeft <= 0){
      clearInterval(timerInterval);
      showResults();
    }
  }, 1000);
}

renderQuestion();
startTimer();
</script>
