        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: #0c0a06;
            min-height: 100vh;
            font-family: 'Inter', -apple-system, 'Segoe UI', sans-serif;
            color: #e8e2cf;
            display: flex;
            justify-content: center;
            padding: 12px;
        }
        #root {
            max-width: 1200px;
            width: 100%;
            background: #14100a;
            border-radius: 28px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.9);
            padding: 20px 24px 40px;
            border: 1px solid #2a2418;
            position: relative;
            overflow: hidden;
        }
        /* scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #14100a;
        }
        ::-webkit-scrollbar-thumb {
            background: #3a3526;
            border-radius: 8px;
        }
        .pc-root {
            font-family: 'Inter', -apple-system, 'Segoe UI', sans-serif;
        }
        .pc-root * {
            box-sizing: border-box;
        }
        .pc-input {
            background: #1c1810;
            border: 1px solid #2e2818;
            border-radius: 10px;
            padding: 10px 14px;
            color: #e8e2cf;
            font-size: 14px;
            width: 100%;
            transition: border-color 0.18s ease, box-shadow 0.18s ease;
            font-family: inherit;
        }
        .pc-input:focus {
            outline: none;
            border-color: #ffd54a !important;
            box-shadow: 0 0 0 3px rgba(255, 213, 74, 0.15);
            background: #211c10 !important;
        }
        .pc-input:hover {
            border-color: #4a4330;
        }
        .pc-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            font-family: inherit;
            transition: transform 0.12s ease, filter 0.12s ease, box-shadow 0.12s ease;
            position: relative;
            color: #e8e2cf;
        }
        .pc-btn:hover {
            filter: brightness(1.09);
        }
        .pc-btn:active {
            transform: scale(0.95);
        }
        .pc-card-hover {
            transition: transform 0.2s cubic-bezier(0.2, 0.8, 0.3, 1), box-shadow 0.2s ease, border-color 0.2s ease;
        }
        .pc-card-hover:hover {
            transform: translateY(-3px);
            border-color: #4a4330;
            box-shadow: 0 14px 32px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 213, 74, 0.08);
        }
        .pc-gold-btn {
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #c9a13b, #ffd54a, #c9a13b);
            color: #1a1408;
            font-weight: 700;
            border-radius: 10px;
            padding: 10px 18px;
            font-size: 13px;
            border: none;
            cursor: pointer;
            transition: transform 0.12s ease, filter 0.12s ease;
        }
        .pc-gold-btn:hover {
            filter: brightness(1.12);
            transform: scale(1.01);
        }
        .pc-gold-btn:active {
            transform: scale(0.95);
        }
        .pc-gold-btn::after {
            content: "";
            position: absolute;
            top: 0;
            left: -60%;
            width: 40%;
            height: 100%;
            background: linear-gradient(100deg, transparent, rgba(255, 255, 255, 0.55), transparent);
            transform: skewX(-20deg);
            transition: left 0.55s ease;
        }
        .pc-gold-btn:hover::after {
            left: 120%;
        }
        .pc-fade-up {
            animation: pcFadeUp 0.55s cubic-bezier(0.2, 0.8, 0.3, 1) both;
        }
        @keyframes pcFadeUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .pc-pop-in {
            animation: pcPopIn 0.3s cubic-bezier(0.3, 1.3, 0.6, 1) both;
        }
        @keyframes pcPopIn {
            from {
                transform: scale(0.85);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }
        .pc-toast-in {
            animation: pcSlideDown 0.32s cubic-bezier(0.2, 0.8, 0.3, 1) both;
        }
        @keyframes pcSlideDown {
            from {
                opacity: 0;
                transform: translate(-50%, -14px);
            }
            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }
        .pc-glow-pulse {
            animation: pcPulseGlow 2.4s ease-in-out infinite;
        }
        @keyframes pcPulseGlow {
            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(255, 213, 74, 0.32);
            }
            50% {
                box-shadow: 0 0 0 8px rgba(255, 213, 74, 0);
            }
        }
        .pc-ring-spin {
            animation: pcRingSpin 7s linear infinite;
        }
        @keyframes pcRingSpin {
            to {
                transform: rotate(360deg);
            }
        }
        .pc-bounce {
            animation: pcBounce 1.1s ease-in-out infinite;
        }
        @keyframes pcBounce {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-14px);
            }
        }
        .pc-load-fill {
            animation: pcLoadSweep 1.25s ease-in-out infinite;
        }
        @keyframes pcLoadSweep {
            0% {
                transform: translateX(-110%);
            }
            100% {
                transform: translateX(280%);
            }
        }
        .pc-strip {
            animation: pcStripPan 7s linear infinite;
        }
        @keyframes pcStripPan {
            to {
                background-position: 200% center;
            }
        }
        .pc-shimmer-text {
            background-size: 200% auto;
            animation: pcShimmer 3.2s linear infinite;
        }
        @keyframes pcShimmer {
            to {
                background-position: 200% center;
            }
        }
        .pc-float {
            animation: pcFloat 5.5s ease-in-out infinite;
        }
        @keyframes pcFloat {
            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-9px) rotate(6deg);
            }
        }
        .pc-crown {
            animation: pcCrownBob 2.2s ease-in-out infinite;
        }
        @keyframes pcCrownBob {
            0%,
            100% {
                transform: translateY(0) rotate(-3deg);
            }
            50% {
                transform: translateY(-4px) rotate(3deg);
            }
        }
        .pc-trophy-hover {
            transition: transform 0.25s cubic-bezier(0.3, 1.4, 0.5, 1);
        }
        .pc-trophy-hover:hover {
            transform: scale(1.12) rotate(-4deg);
        }
        .pc-sparkle {
            animation: pcSparkle 2.1s ease-in-out infinite;
        }
        @keyframes pcSparkle {
            0%,
            100% {
                opacity: 0.25;
                transform: scale(0.85);
            }
            50% {
                opacity: 1;
                transform: scale(1.15);
            }
        }
        .pc-stadium-sweep {
            animation: pcStadiumSweep 6s ease-in-out infinite;
        }
        @keyframes pcStadiumSweep {
            0% {
                transform: translateX(-30%);
                opacity: 0;
            }
            50% {
                opacity: 0.5;
            }
            100% {
                transform: translateX(130%);
                opacity: 0;
            }
        }
        .pc-podium-bar {
            animation: pcRise 0.7s cubic-bezier(0.2, 0.8, 0.3, 1) both;
        }
        @keyframes pcRise {
            from {
                height: 0;
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .pc-kick-in {
            animation: pcKickIn 0.5s cubic-bezier(0.34, 1.4, 0.64, 1) both;
        }
        @keyframes pcKickIn {
            0% {
                transform: scale(0.4) rotate(-30deg);
                opacity: 0;
            }
            60% {
                transform: scale(1.12) rotate(8deg);
                opacity: 1;
            }
            100% {
                transform: scale(1) rotate(0deg);
            }
        }
        .pc-confetti {
            animation: pcConfetti 2.4s ease-in infinite;
        }
        @keyframes pcConfetti {
            0% {
                transform: translateY(-12px) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            100% {
                transform: translateY(140px) rotate(380deg);
                opacity: 0;
            }
        }
        .pc-gold-sheen {
            background-size: 250% auto;
            animation: pcGoldSheen 2.6s linear infinite;
        }
        @keyframes pcGoldSheen {
            0% {
                background-position: -150% center;
            }
            100% {
                background-position: 250% center;
            }
        }
        .pc-underline-glow {
            animation: pcUnderlineGlow 1.8s ease-in-out infinite;
        }
        @keyframes pcUnderlineGlow {
            0%,
            100% {
                opacity: 0.6;
            }
            50% {
                opacity: 1;
            }
        }
        .pc-modal-in {
            animation: pcModalIn 0.25s cubic-bezier(0.2, 0.8, 0.3, 1) both;
        }
        @keyframes pcModalIn {
            from {
                opacity: 0;
                transform: scale(0.96) translateY(6px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
        @media (prefers-reduced-motion: reduce) {
            .pc-fade-up,
            .pc-pop-in,
            .pc-toast-in,
            .pc-glow-pulse,
            .pc-ring-spin,
            .pc-bounce,
            .pc-load-fill,
            .pc-strip,
            .pc-shimmer-text,
            .pc-float,
            .pc-crown,
            .pc-trophy-hover,
            .pc-sparkle,
            .pc-stadium-sweep,
            .pc-podium-bar,
            .pc-kick-in,
            .pc-confetti,
            .pc-gold-sheen,
            .pc-underline-glow,
            .pc-modal-in {
                animation: none !important;
                transition: none !important;
            }
        }
    </style>

        // ─── SCORING ──────────────────────────────────────────────────────
        function calcPts(preds, result, stage) {
            if (!result || !result.winner) return {};
            const isBig = BIG_STAGES.includes(stage);
            const isKO = KNOCKOUT_STAGES.includes(stage);
            const winPt = isBig ? 2 : 1;
            const exactPt = isBig ? 3 : 2;
            const drawBonusPt = isBig ? 2.5 : 1.5;
            const actualWasDrawScore = numEq(result.score1, result.score2);
            return Object.fromEntries(PLAYERS.map(p => {
                const r = preds && preds[p];
                if (!r || !r.winner) return [p, 0];
                const ok = r.winner.trim().toLowerCase() === result.winner.trim().toLowerCase();
                if (!ok) return [p, 0];
                const exact = numEq(r.score1, result.score1) && numEq(r.score2, result.score2);
                if (exact) return [p, exactPt];
                if (isKO && isPredictedDraw(r) && actualWasDrawScore) return [p, drawBonusPt];
                return [p, winPt];
            }));
        }

        function calcAwardPts(awardPreds, awards) {
            const out = {};
            PLAYERS.forEach(p => {
                const perAward = {};
                let total = 0;
                AWARD_KEYS.forEach(key => {
                    const guess = awardPreds && awardPreds[p] && awardPreds[p][key];
                    const actual = awards && awards[key];
                    const guessPlayer = guess && guess.player ? guess.player.trim() : null;
                    const actualPlayer = actual && actual.player ? actual.player.trim() : null;
                    const guessTeam = guess && guess.team ? guess.team.trim() : null;
                    const actualTeam = actual && actual.team ? actual.team.trim() : null;
                    if (!guessPlayer || !actualPlayer) { perAward[key] = 0; return; }
                    if (guessPlayer.toLowerCase() === actualPlayer.toLowerCase()) { perAward[key] = 2; } else if (guessTeam && actualTeam && guessTeam.toLowerCase() === actualTeam.toLowerCase()) { perAward[
                            key] = 1; } else { perAward[key] = 0; }
                    total += perAward[key];
                });
                const ballBootBonus = (perAward.goldenBall === 2 && perAward.goldenBoot === 2) ? 3 : 0;
                out[p] = { perAward, total: total + ballBootBonus, ballBootBonus };
            });
            return out;
        }

        function calcStandingPts(standingPreds, standings) {
            const out = {};
            PLAYERS.forEach(p => {
                const perSlot = {};
                let correctCount = 0;
                let total = 0;
                STANDING_KEYS.forEach(key => {
                    const guess = standingPreds && standingPreds[p] && standingPreds[p][key] ? standingPreds[p][key]
                        .trim() : null;
                    const actual = standings && standings[key] ? standings[key].trim() : null;
                    if (!guess || !actual) { perSlot[key] = 0; return; }
                    if (guess.toLowerCase() === actual.toLowerCase()) { perSlot[key] = 2;
                        correctCount++; } else { perSlot[key] = 0; }
                    total += perSlot[key];
                });
                const bonus = correctCount >= 2 ? 3 : 0;
                out[p] = { perSlot, total: total + bonus, bonus, correctCount };
            });
            return out;
