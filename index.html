<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>নবম শ্রেণি: বাংলা দ্বিতীয় পত্র (MCQ)</title>
    <style>
        :root {
            --paper: #F6EFE2;
            --paper-deep: #EFE4D0;
            --ink: #2C2419;
            --ink-soft: #5C5042;
            --maroon: #7C2230;
            --maroon-deep: #5A1722;
            --teal: #1E4943;
            --gold: #B8902F;
            --line: #D8C9AC;
            --good: #2E6B4F;
            --bad: #A33A2E;
            --radius: 14px;
        }
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html,
        body {
            margin: 0;
            padding: 0;
        }
        body {
            background: radial-gradient(900px 500px at 10% -10%, rgba(124, 34, 48, 0.06), transparent 60%), radial-gradient(900px 600px at 110% 10%, rgba(30, 73, 67, 0.07), transparent 60%), var(--paper);
            color: var(--ink);
            font-family: 'Hind Siliguri', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 18px 16px 60px;
        }
        .app {
            width: 100%;
            max-width: 640px;
        }
        .timer-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-bottom: 14px;
        }
        .timer-pill {
            font-family: 'Hind Siliguri', sans-serif;
            font-weight: 700;
            font-size: 14px;
            background: #FFFDF8;
            border: 1.5px solid var(--line);
            color: var(--maroon);
            padding: 7px 14px;
            border-radius: 99px;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .timer-pill.warn {
            border-color: var(--bad);
            color: var(--bad);
        }
        .progress-wrap {
            margin-bottom: 18px;
        }
        .progress-meta {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            font-size: 12px;
            color: var(--ink-soft);
            margin-bottom: 6px;
        }
        .progress-meta b {
            color: var(--maroon);
            font-family: 'Noto Serif Bengali', serif;
            font-size: 13px;
        }
        .progress-track {
            height: 5px;
            background: var(--paper-deep);
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid var(--line);
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--maroon), var(--gold));
            width: 0%;
            transition: width .35s ease;
        }
        .card {
            position: relative;
            background: #FFFDF8;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 26px 22px 22px 30px;
            box-shadow: 0 1px 0 rgba(0, 0, 0, 0.02), 0 18px 40px -24px rgba(44, 36, 25, 0.35);
        }
        .card::before {
            content: "";
            position: absolute;
            left: 0;
            top: 10px;
            bottom: 10px;
            width: 6px;
            background: repeating-linear-gradient(180deg, var(--maroon), var(--maroon) 8px, var(--maroon-deep) 8px, var(--maroon-deep) 9px);
            border-radius: 4px 0 0 4px;
        }
        .tag {
            display: inline-block;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--teal);
            background: rgba(30, 73, 67, 0.08);
            border: 1px solid rgba(30, 73, 67, 0.18);
            padding: 3px 10px;
            border-radius: 99px;
            margin-bottom: 14px;
        }
        .q-text {
            font-family: 'Noto Serif Bengali', serif;
            font-weight: 600;
            font-size: 18px;
            line-height: 1.65;
            margin: 0 0 18px;
            color: var(--ink);
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .opt {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            text-align: left;
            width: 100%;
            background: var(--paper);
            border: 1.5px solid var(--line);
            border-radius: 10px;
            padding: 12px 14px;
            font-family: 'Hind Siliguri', sans-serif;
            font-size: 15px;
            color: var(--ink);
            cursor: pointer;
            transition: border-color .15s, background .15s, transform .1s;
        }
        .opt:active {
            transform: scale(0.99);
        }
        .opt .bullet {
            flex: 0 0 auto;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 1.5px solid var(--ink-soft);
            color: var(--ink-soft);
            font-size: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Hind Siliguri', sans-serif;
        }
        .opt:hover {
            border-color: var(--maroon);
        }
        .opt.selected {
            border-color: var(--maroon);
            background: rgba(124, 34, 48, 0.06);
        }
        .opt.selected .bullet {
            background: var(--maroon);
            border-color: var(--maroon);
            color: #fff;
        }
        .opt.correct {
            border-color: var(--good);
            background: rgba(46, 107, 79, 0.08);
        }
        .opt.correct .bullet {
            background: var(--good);
            border-color: var(--good);
            color: #fff;
        }
        .opt.incorrect {
            border-color: var(--bad);
            background: rgba(163, 58, 46, 0.08);
        }
        .opt.incorrect .bullet {
            background: var(--bad);
            border-color: var(--bad);
            color: #fff;
        }
        .opt[disabled] {
            cursor: default;
        }
        .nav-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            gap: 10px;
        }
        .btn {
            font-family: 'Hind Siliguri', sans-serif;
            font-weight: 600;
            font-size: 14px;
            padding: 11px 18px;
            border-radius: 9px;
            border: none;
            cursor: pointer;
            transition: opacity .15s, transform .1s;
        }
        .btn:active {
            transform: scale(0.97);
        }
        .btn-primary {
            background: var(--maroon);
            color: #fff;
        }
        .btn-primary:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }
        .btn-ghost {
            background: transparent;
            color: var(--ink-soft);
            border: 1.5px solid var(--line);
        }
        .btn-skip {
            background: transparent;
            color: var(--maroon);
            border: 1.5px dashed var(--maroon);
            font-size: 13px;
            padding: 9px 14px;
        }
        .nav-row {
            flex-wrap: wrap;
        }
        .result-card {
            text-align: center;
            padding-top: 34px;
            padding-bottom: 30px;
        }
        .result-score {
            font-family: 'Noto Serif Bengali', serif;
            font-weight: 800;
            font-size: 52px;
            color: var(--maroon);
            line-height: 1;
        }
        .result-out-of {
            font-size: 16px;
            color: var(--ink-soft);
            margin-top: 4px;
        }
        .result-line {
            width: 50px;
            height: 2px;
            background: var(--gold);
            margin: 18px auto;
        }
        .result-msg {
            font-family: 'Noto Serif Bengali', serif;
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 22px;
            color: var(--ink);
        }
        .breakdown {
            text-align: left;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin: 0 0 24px;
            padding: 16px;
            background: var(--paper);
            border-radius: 10px;
            border: 1px solid var(--line);
        }
        .breakdown-row {
            display: flex;
            justify-content: space-between;
            font-size: 13.5px;
        }
        .breakdown-row span:first-child {
            color: var(--ink-soft);
        }
        .breakdown-row span:last-child {
            font-weight: 700;
            color: var(--teal);
        }
        .result-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .share-feedback {
            font-size: 12px;
            color: var(--good);
            height: 16px;
            margin-top: 2px;
        }
        .footer-note {
            text-align: center;
            font-size: 11px;
            color: var(--ink-soft);
            margin-top: 18px;
            letter-spacing: 0.4px;
        }
        .wish-msg {
            font-family: 'Noto Serif Bengali', serif;
            font-weight: 600;
            font-size: 16px;
            color: var(--maroon);
            margin: 0 0 22px;
            line-height: 1.6;
        }
        .flower-layer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 50;
        }
        .flower-bit {
            position: absolute;
            bottom: -40px;
            font-size: 22px;
            opacity: 0.9;
            animation-name: floatUp;
            animation-timing-function: ease-in;
            animation-fill-mode: forwards;
            will-change: transform, opacity;
        }
        @keyframes floatUp {
            0% {
                transform: translateY(0) translateX(0) rotate(0deg);
                opacity: 0.95;
            }
            100% {
                transform: translateY(-115vh) translateX(var(--drift, 20px)) rotate(360deg);
                opacity: 0;
            }
        }
        @media (prefers-reduced-motion: reduce) {
            .progress-fill,
            .opt,
            .btn {
                transition: none;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="timer-bar">
            <span class="timer-pill" id="timerPill">⏱ ১০:০০</span>
        </div>
        <div class="progress-wrap">
            <div class="progress-meta">
                <span><b id="qNum">১</b> / <span id="totalQ">২০</span></span>
                <span id="sectionLabel">বাংলা দ্বিতীয় পত্র</span>
            </div>
            <div class="progress-track">
                <div class="progress-fill" id="progressFill" style="width:5%;"></div>
            </div>
        </div>

        <div id="quizScreen">
            <div class="card">
                <div class="tag" id="catTag">বাংলা দ্বিতীয় পত্র</div>
                <p class="q-text" id="qText"></p>
                <div class="options" id="optionsWrap"></div>
            </div>
            <div class="nav-row">
                <button class="btn btn-ghost" id="prevBtn">← আগের প্রশ্ন</button>
                <button class="btn btn-skip" id="skipBtn">এড়িয়ে যান</button>
                <button class="btn btn-primary" id="nextBtn" disabled>পরবর্তী →</button>
            </div>
        </div>

        <div id="resultScreen" style="display:none;">
            <div class="card result-card">
                <div class="result-score" id="finalScore">০</div>
                <div class="result-out-of">/ <span id="totalQResult">২০</span> সঠিক</div>
                <div class="result-line"></div>
                <p class="result-msg" id="resultMsg"></p>
                <div class="breakdown" id="breakdownWrap"></div>
                <p class="wish-msg">শুভকামনা তোমার পরীক্ষার জন্য! 🌸</p>
                <div class="result-actions">
                    <button class="btn btn-primary" id="shareBtn">ফলাফল শেয়ার করুন 📤</button>
                    <button class="btn btn-ghost" id="retakeBtn">আবার দিন</button>
                </div>
                <div class="share-feedback" id="shareFeedback"></div>
            </div>
        </div>
        <div class="footer-note">নবম শ্রেণি: বাংলা দ্বিতীয় পত্র (চূড়ান্ত ২০টি এসএসসি স্ট্যান্ডার্ড MCQ)</div>
    </div>
    <div class="flower-layer" id="flowerLayer"></div>

    <script>
        const QUESTIONS = [
            { q: "আনুমানিক কত বছর আগে 'পূর্ব ভারতীয় প্রাকৃত' ভাষা থেকে বাংলা ভাষার জন্ম হয়?", opts: ["পাঁচশো বছর", "এক হাজার বছর", "দেড় হাজার বছর", "দুই হাজার বছর"], correct: 1 },
            { q: "বাংলা লিপি কোন লিপির বিবর্তিত রূপ?", opts: ["ব্রাহ্মী", "কুটিল", "খরোষ্ঠি", "শারদা"], correct: 1 },
            { q: "বাংলা ভাষায় রচিত প্রথম বাংলা ব্যাকরণ 'গৌড়ীয় ব্যাকরণ'-এর রচয়িতা কে?", opts: ["উইলিয়াম কেরি", "নাথানিয়েল ব্রাসি হ্যালহেড", "রামমোহন রায়", "ঈশ্বরচন্দ্র বিদ্যাসাগর"], correct: 2 },
            { q: "বাংলা ব্যাকরণ অংশে 'উক্তি' ও 'বাচ্য' কোন তত্ত্বে আলোচিত হয়?", opts: ["ধ্বনিতত্ত্ব", "রূপতত্ত্ব", "বাক্যতত্ত্ব", "অর্থতত্ত্ব"], correct: 2 },
            { q: "বাগযন্ত্রের মধ্যে সবচেয়ে সচল ও সক্রিয় প্রত্যঙ্গ কোনটি?", opts: ["ফুসফুস", "আলজিভ", "জিভ", "কোমল তালু"], correct: 2 },
            { q: "ব্যঞ্জনবর্ণের সাথে কারবর্ণ বা হচিহ্ন না থাকলে কোন ধ্বনিটি আছে বলে ধরে নেওয়া হয়?", opts: ["[অ]", "[আ]", "[ই]", "[উ]"], correct: 0 },
            { q: "বাংলা वर्णমালায় 'অনুবর্ণ' বলতে কী বোঝায়?", opts: ["স্বরবর্ণের সংক্ষিপ্ত রূপ যা ব্যঞ্জনবর্ণের সাথে যুক্ত হয়", "ব্যঞ্জনবর্ণের বিকল্প রূপ যেমন— ফলা, রেফ ও বর্ণসংক্ষেপ", "এমন বর্ণ যা উচ্চারণের সময় বায়ু মুখগহ্বরের কোথাও বাধা পায় না", "একাধিক বর্ণ যুক্ত হয়ে তৈরি হওয়া অস্বচ্ছ বর্ণসমষ্টি"], correct: 1 },
            { q: "লগ্নক যুক্ত শব্দকে বাক্যে ব্যবহারের সময় কী বলা হয়?", opts: ["প্রকৃতি", "পদ", "উপসর্গ", "অনুবর্ণ"], correct: 1 },
            { q: "'শব্দ' ও 'পদ'-এর পার্থক্য বিচারে নিচের কোন বাক্যটি সঠিক নয়?", opts: ["শব্দ যখন বাক্যে ব্যবহৃত হয় তখন তার নাম হয় পদ", "শব্দের অংশ হলো উপসর্গ ও প্রত্যয়; আর পদের অংশ হলো বিভক্তি ও নির্দেশক", "অভিধানের শব্দগুলো পরস্পর সম্পর্কযুক্ত কিন্তু বাক্যের পদগুলো বিচ্ছিন্ন", "গঠনগতভাবে শব্দ দুই প্রকার (মৌলিক ও সাধিত), আর পদ দুই প্রকার (সলগ্নক ও অলগ্নক)"], correct: 2 },
            { q: "'দোলনা' (দুল্+অনা) শব্দটি কোন প্রত্যয় যোগে গঠিত হয়েছে?", opts: ["তদ্ধিত প্রত্যয়", "বিভক্তি", "কৃৎ প্রত্যয়", "উপসর্গ"], correct: 2 },
            { q: "সন্ধির নিয়মানুসারে নিচের কোনটি 'নিপাতনে সিদ্ধ' ব্যঞ্জনসন্ধি?", opts: ["পরিচ্ছদ (পরি+ছেদ)", "একাদশ (এক+দশ)", "দিগন্ত (দিক্‌+অন্ত)", "চলচ্চিত্র (চলৎ+চিত্র)"], correct: 1 },
            { q: "নিচের কোনটি 'নিত্য নারীবাচক' শব্দের উদাহরণ?", opts: ["শিক্ষিকা", "জেলেনি", "সতীন", "বালিকা"], correct: 2 },
            { q: "'কুড়ি, পেট, চুলা, কুলা'— এগুলো কোন শ্রেণির শব্দ?", opts: ["তৎসম শব্দ", "তদ্ভব শব্দ", "বিদেশি শব্দ", "দেশি শব্দ"], correct: 3 },
            { q: "গঠন বিবেচনায় বাংলা শব্দকে কয়টি ভাগে ভাগ করা যায়?", opts: ["দুই ভাগে (মৌলিক ও সাধিত)", "তিন ভাগে (তৎসম, তদ্ভব, দেশি)", "চার ভাগে", "আট ভাগে"], correct: 0 },
            { q: "নিচের কোনটি 'সাপেক্ষ সর্বনাম'-এর জোড়?", opts: ["কে-কারা", "নিজে-স্বয়ং", "যারা-তারা", "অন্য-অপর"], correct: 2 },
            { q: "'এই পুকুরের পানি ঘোলা'— বাক্যে 'ঘোলা' কোন জাতীয় বিশেষণ?", opts: ["বর্ণবাচক", "অবস্থাবাচক", "ভাববাচক", "বিধেয় বিশেষণ"], correct: 3 },
            { q: "'একটু ঘুরে আসুন না!'— এই বাক্যে 'না' কোন পদ হিসেবে ব্যবহৃত হয়েছে?", opts: ["নেতিবাচক ক্রিয়াবিশেষণ", "পদাণু ক্রিয়াবিশেষণ", "যোজক পদ", "অনুসর্গ পদ"], correct: 1 },
            { q: "'যদি রোদ ওঠে, তবে রওনা দেব'— এখানে 'যদি-তবে' কোন ধরনের যোজক?", opts: ["সাধারণ যোজক", "বিকল্প যোজক", "বিরোধ যোজক", "সাপেক্ষ যোজক"], correct: 3 },
            { q: "কোনো কিছুর সামান্য অংশ বা অল্প পরিমাণ বোঝাতে কোন নির্দেশকটি ব্যবহৃত হয়?", opts: ["-টা/-টি", "-টুকু", "-জন", "-খানা"], correct: 1 },
            { q: "ক্রিয়ামূলের সাথে কোন লগ্নক যুক্ত হয়ে ক্রিয়ার কাল ও পক্ষ নির্দেশিত হয়?", opts: ["কারক বিভক্তি", "নির্দেশক", "ক্রিয়াবিভক্তি", "বলক"], correct: 2 }
        ];

        const TOTAL = QUESTIONS.length;
        let current = 0;
        let answers = new Array(TOTAL).fill(null);
        let skipped = new Array(TOTAL).fill(false);

        const qNumEl = document.getElementById('qNum');
        const sectionLabelEl = document.getElementById('sectionLabel');
        const progressFill = document.getElementById('progressFill');
        const catTag = document.getElementById('catTag');
        const qText = document.getElementById('qText');
        const optionsWrap = document.getElementById('optionsWrap');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const skipBtn = document.getElementById('skipBtn');
        const quizScreen = document.getElementById('quizScreen');
        const resultScreen = document.getElementById('resultScreen');
        const timerPill = document.getElementById('timerPill');

        document.getElementById('totalQ').textContent = TOTAL;
        document.getElementById('totalQResult').textContent = TOTAL;

        const toBnDigits = (n) => String(n).replace(/\d/g, d => "০১২৩৪৫৬৭৮৯"[d]);
        const letters = ["ক", "খ", "গ", "ঘ"];

        function renderQuestion() {
            const item = QUESTIONS[current];
            qNumEl.textContent = toBnDigits(current + 1);
            sectionLabelEl.textContent = "বাংলা দ্বিতীয় পত্র";
            catTag.textContent = "বাংলা দ্বিতীয় পত্র";
            qText.textContent = (current + 1) + ". " + item.q;
            progressFill.style.width = ((current + 1) / TOTAL * 100) + "%";

            optionsWrap.innerHTML = "";
            item.opts.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = "opt";
                btn.innerHTML = `<span class="bullet">${letters[idx]}</span><span>${opt}</span>`;
                if (answers[current] !== null) {
                    btn.disabled = true;
                    if (idx === item.correct) {
                        btn.classList.add('correct');
                    } else if (idx === answers[current]) {
                        btn.classList.add('incorrect');
                    }
                }
                if (answers[current] === idx) btn.classList.add('selected');
                btn.addEventListener('click', () => selectAnswer(idx));
                optionsWrap.appendChild(btn);
            });

            prevBtn.style.visibility = current === 0 ? "hidden" : "visible";
            nextBtn.disabled = answers[current] === null && !skipped[current];
            nextBtn.textContent = current === TOTAL - 1 ? "ফলাফল দেখুন →" : "পরবর্তী →";
            skipBtn.style.visibility = answers[current] !== null ? "hidden" : "visible";
        }

        function selectAnswer(idx) {
            if (answers[current] !== null) return;
            answers[current] = idx;
            skipped[current] = false;
            renderQuestion();
        }

        nextBtn.addEventListener('click', () => {
            if (answers[current] === null && !skipped[current]) return;
            if (current === TOTAL - 1) {
                showResults();
            } else {
                current++;
                renderQuestion();
            }
        });

        skipBtn.addEventListener('click', () => {
            skipped[current] = true;
            if (current === TOTAL - 1) {
                showResults();
            } else {
                current++;
                renderQuestion();
            }
        });

        prevBtn.addEventListener('click', () => {
            if (current > 0) {
                current--;
                renderQuestion();
            }
        });

        function showResults() {
            clearInterval(timerInterval);
            let score = 0;
            let skippedCount = 0;

            QUESTIONS.forEach((item, i) => {
                if (answers[i] === item.correct) {
                    score++;
                }
                if (answers[i] === null) skippedCount++;
            });

            document.getElementById('finalScore').textContent = toBnDigits(score);

            let msg;
            const pct = score / TOTAL;
            if (pct >= 0.85) msg = "চমৎকার! সাহিত্যজ্ঞান অসাধারণ। 🏆";
            else if (pct >= 0.65) msg = "বেশ ভালো হয়েছে! আরেকটু ঝালিয়ে নিলেই পরিপূর্ণ। 👍";
            else if (pct >= 0.4) msg = "মন্দ নয়, তবে আরেকবার পড়ে নেওয়া দরকার। 📖";
            else msg = "চিন্তা নেই, আবার চেষ্টা করুন — পড়াই শেখার পথ। ✨";
            document.getElementById('resultMsg').textContent = msg;

            const breakdownWrap = document.getElementById('breakdownWrap');
            breakdownWrap.innerHTML = "";
            const row = document.createElement('div');
            row.className = "breakdown-row";
            row.innerHTML = `<span>সঠিক উত্তর</span><span>${toBnDigits(score)} / ${toBnDigits(TOTAL)}</span>`;
            breakdownWrap.appendChild(row);

            if (skippedCount > 0) {
                const row2 = document.createElement('div');
                row2.className = "breakdown-row";
                row2.innerHTML = `<span>এড়িয়ে যাওয়া প্রশ্ন</span><span>${toBnDigits(skippedCount)}</span>`;
                breakdownWrap.appendChild(row2);
            }

            quizScreen.style.display = "none";
            resultScreen.style.display = "block";
            document.getElementById('shareBtn').onclick = () => shareResults(score);
            document.getElementById('retakeBtn').onclick = retake;
            startFlowers();
        }

        const flowerEmojis = ["🌸", "🌷", "🌼", "💮", "🌺"];
        const flowerLayer = document.getElementById('flowerLayer');
        let flowerInterval = null;

        function spawnFlower() {
            const el = document.createElement('span');
            el.className = "flower-bit";
            el.textContent = flowerEmojis[Math.floor(Math.random() * flowerEmojis.length)];
            const leftPct = Math.random() * 100;
            const duration = 6 + Math.random() * 5;
            const drift = (Math.random() * 120 - 60) + "px";
            const size = 16 + Math.random() * 16;
            el.style.left = leftPct + "%";
            el.style.fontSize = size + "px";
            el.style.setProperty('--drift', drift);
            el.style.animationDuration = duration + "s";
            flowerLayer.appendChild(el);
            setTimeout(() => el.remove(), duration * 1000 + 200);
        }

        function startFlowers() {
            stopFlowers();
            for (let i = 0; i < 6; i++) {
                setTimeout(spawnFlower, i * 250);
            }
            flowerInterval = setInterval(spawnFlower, 700);
        }

        function stopFlowers() {
            clearInterval(flowerInterval);
            flowerLayer.innerHTML = "";
        }

        async function shareResults(score) {
            const lines = [
                `📚 নবম শ্রেণি: বাংলা দ্বিতীয় পত্র (MCQ)`,
                `স্কোর: ${toBnDigits(score)}/${toBnDigits(TOTAL)} (${Math.round(score/TOTAL*100)}%)`,
                ``,
                `তুমিও দাও পরীক্ষা! 🎯`
            ];
            const text = lines.join("\n");
            const feedback = document.getElementById('shareFeedback');

            if (navigator.share) {
                try {
                    await navigator.share({ title: "বাংলা দ্বিতীয় পত্র ফলাফল", text });
                    return;
                } catch (e) { /* fall through to clipboard */ }
            }
            try {
                await navigator.clipboard.writeText(text);
                feedback.textContent = "ফলাফল কপি হয়েছে — পেস্ট করে শেয়ার করুন ✓";
                setTimeout(() => feedback.textContent = "", 3000);
            } catch (e) {
                feedback.textContent = text;
            }
        }

        function retake() {
            current = 0;
            answers = new Array(TOTAL).fill(null);
            skipped = new Array(TOTAL).fill(false);
            resultScreen.style.display = "none";
            quizScreen.style.display = "block";
            stopFlowers();
            renderQuestion();
            startTimer();
        }

        let timeLeft = 10 * 60;
        let timerInterval = null;

        function updateTimerDisplay() {
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            const text = "⏱ " + toBnDigits(String(m).padStart(2, '0')) + ":" + toBnDigits(String(s).padStart(2, '0'));
            timerPill.textContent = text;
            timerPill.classList.toggle('warn', timeLeft <= 60);
        }

        function startTimer() {
            timeLeft = 10 * 60;
            updateTimerDisplay();
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    showResults();
                }
            }, 1000);
        }

        renderQuestion();
        startTimer();
    </script>
</body>
  </html>
